<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollen Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --green: #2ecc71;
            --orange: #f39c12;
            --red: #e74c3c;
            --accent: #3498db;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
        }
        h1 { font-size: 1.2rem; margin: 0; }
        .lang-switch {
            background: #ddd;
            padding: 5px;
            border-radius: 20px;
            display: flex;
            gap: 5px;
            cursor: pointer;
        }
        .lang-btn {
            padding: 2px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .lang-btn.active {
            background: var(--accent);
            color: white;
        }

        .last-updated { font-size: 0.8rem; color: #666; text-align: center; margin-bottom: 1.5rem; }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .status-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .status-card h3 { margin: 0; font-size: 0.9rem; text-transform: capitalize; }
        .traffic-light {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin: 10px auto;
        }
        .val { font-weight: bold; font-size: 1.1rem; }
        .unit { font-size: 0.7rem; color: #888; }

        .chart-container {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        @media (max-width: 480px) {
            body { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="mainTitle">Pollen Alert Slovakia</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <a id="stateLink" href="index_sk.html" style="font-size: 0.8rem; text-decoration: none; color: var(--accent); font-weight: bold; border: 1px solid var(--accent); padding: 2px 8px; border-radius: 5px;">State Data 🇸🇰</a>
                <div class="lang-switch" onclick="toggleLang()">
                    <div id="btnEn" class="lang-btn">EN</div>
                    <div id="btnSk" class="lang-btn">SK</div>
                </div>
            </div>
        </header>
        
        <div id="lastUpdated" class="last-updated">Loading...</div>

        <div id="statusGrid" class="status-grid"></div>

        <div class="chart-container">
            <canvas id="pollenChart"></canvas>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: "Pollen Alert Slovakia",
                stateBtn: "State Data 🇸🇰",
                lastUpdated: "Last updated: ",
                unit: "grains/m³",
                trend: "5-Day Trend",
                error: "Error loading data.json. Ensure the GitHub Action has run.",
                names: {'alder': 'Alder', 'birch': 'Birch', 'grass': 'Grass', 'mugwort': 'Mugwort', 'ragweed': 'Ragweed'}
            },
            sk: {
                title: "Peľové spravodajstvo SR",
                stateBtn: "Štátne dáta 🇸🇰",
                lastUpdated: "Naposledy aktualizované: ",
                unit: "zŕn/m³",
                trend: "5-dňový trend",
                error: "Chyba pri načítaní data.json. Skontrolujte GitHub Action.",
                names: {'alder': 'Jelša', 'birch': 'Breza', 'grass': 'Tráva', 'mugwort': 'Palina', 'ragweed': 'Ambrózia'}
            }
        };

        let currentLang = localStorage.getItem('pollenLang') || 'en';
        let globalData = null;
        let myChart = null;

        function updateLangUI() {
            document.getElementById('btnEn').classList.toggle('active', currentLang === 'en');
            document.getElementById('btnSk').classList.toggle('active', currentLang === 'sk');
            if (globalData) renderData();
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'sk' : 'en';
            localStorage.setItem('pollenLang', currentLang);
            updateLangUI();
        }

        async function renderData() {
            const t = translations[currentLang];
            document.getElementById('mainTitle').innerText = t.title;
            document.getElementById('stateLink').innerText = t.stateBtn;
            
            const locale = currentLang === 'sk' ? 'sk-SK' : 'en-US';
            document.getElementById('lastUpdated').innerText = t.lastUpdated + new Date(globalData.last_updated).toLocaleString(locale);
            
            const todayData = globalData.daily_data[0];
            const threshold = globalData.threshold;
            const statusGrid = document.getElementById('statusGrid');
            statusGrid.innerHTML = '';
            
            Object.entries(todayData.allergens).forEach(([name, value]) => {
                const card = document.createElement('div');
                card.className = 'status-card';
                let color = 'var(--green)';
                if (value >= threshold * 5) color = 'var(--red)';
                else if (value >= threshold) color = 'var(--orange)';
                
                card.innerHTML = `
                    <h3>${t.names[name] || name}</h3>
                    <div class="traffic-light" style="background-color: ${color}"></div>
                    <div class="val">${value.toFixed(1)}</div>
                    <div class="unit">${t.unit}</div>
                `;
                statusGrid.appendChild(card);
            });

            const labels = globalData.daily_data.map(d => {
                const parts = d.date.split('-');
                return currentLang === 'sk' ? `${parts[2]}.${parts[1]}.` : `${parts[1]}/${parts[2]}`;
            });

            const datasets = Object.keys(todayData.allergens).map((name, index) => {
                const colors = ['#3498db', '#e67e22', '#9b59b6', '#1abc9c', '#f1c40f'];
                return {
                    label: t.names[name] || name,
                    data: globalData.daily_data.map(d => d.allergens[name]),
                    borderColor: colors[index % colors.length],
                    tension: 0.3,
                    fill: false
                };
            });

            if (myChart) myChart.destroy();
            const ctx = document.getElementById('pollenChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' },
                        title: { display: true, text: t.trend }
                    },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: t.unit } }
                    }
                }
            });
        }

        async function loadData() {
            try {
                const response = await fetch('data.json');
                globalData = await response.json();
                // Use backend lang as default if no local preference exists
                if (!localStorage.getItem('pollenLang')) {
                    currentLang = globalData.lang || 'en';
                }
                updateLangUI();
            } catch (e) {
                console.error(e);
                document.getElementById('lastUpdated').innerText = translations[currentLang].error;
            }
        }

        loadData();
    </script>
</body>
</html>
